#MAX3
[include cp_macro.cfg]
[include homing_override.cfg]

#[include bed_mesh.cfg] 

[printer]
kinematics:corexy
max_velocity: 600
max_accel: 20000
minimum_cruise_ratio: 0.5
max_z_velocity: 20
max_z_accel: 500
square_corner_velocity: 8

[exclude_object]

[force_move]
enable_force_move : false


#####################################################################################  MCUs START
[mcu]
serial : /tmp/klipper_host_mcu
 
[mcu M8P]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_060018000A51313339373836-if00
restart_method: command

[mcu cp_Head]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_48FF6D067265545208410287-if00
restart_method: command
baud: 250000

[mcu cp_kcm]
serial: /dev/serial/by-id//usb-Klipper_stm32f103xe_32FFD5053130433221591643-if00
restart_method: command
baud: 250000
#####################################################################################  MCUs END

#####################################################################################  Temperature sensors START
[temperature_sensor CB1]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor M8P]
sensor_type: temperature_mcu
sensor_mcu: M8P
min_temp: 0
max_temp: 350

[temperature_sensor Chromahead]
sensor_type: temperature_mcu
sensor_mcu: cp_Head
min_temp: 0
max_temp: 350

[temperature_sensor KCM]
sensor_type: temperature_mcu
sensor_mcu: cp_kcm
min_temp: 0
max_temp: 350
#####################################################################################  Temperature sensors END

#####################################################################################  Fans START
[heater_fan extruder]
heater: extruder
pin: cp_Head:PA0
heater_temp: 50.0

[fan] #  Part cooling fan                       
pin: cp_Head:PC9
max_power: 1.0
kick_start_time: 0.5
off_below: 0.10
cycle_time: 0.010
hardware_pwm: False

[output_pin M8P_CB1_Fan] #  M8P & CB1 cooling
pin: M8P:PF8 # M8P FAN3
pwm: False
value: 1
#####################################################################################  Fans END

#####################################################################################  Toolhead START
[servo cp1]
pin: cp_Head:PA4
initial_angle: 0
maximum_servo_angle: 180
minimum_pulse_width:0.0008
maximum_pulse_width:0.00220

[extruder]
max_extrude_only_distance: 300.0
max_extrude_cross_section:10
full_steps_per_rotation: 200
step_pin: cp_Head:PA9
dir_pin: !cp_Head:PA8
enable_pin: !cp_Head:PA10
microsteps: 16
rotation_distance: 4.541186
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: cp_Head:PA2
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: cp_Head:PA1
#control: pid
#pid_Kp:41.325
#pid_Ki:1.887
#pid_Kd:226.252
min_temp: 0
max_temp: 300
min_extrude_temp: 175
pressure_advance:0.068
pressure_advance_smooth_time: 0.040

[verify_heater extruder]
heating_gain: 2
check_gain_time:60
hysteresis: 10
max_error: 9999999999

[probe]
pin: cp_Head:PA3
x_offset: 33
y_offset: -1.5
#z_offset: 2
speed: 300
lift_speed: 10.0
samples: 1
samples_result: median
sample_retract_dist: 0.5
samples_tolerance: 0.1
samples_tolerance_retries: 10
#####################################################################################  Toolhead END

#####################################################################################  Stepper X Y Z START
[stepper_x]
step_pin: M8P:PE6
dir_pin: M8P:PE5
enable_pin: !M8P:PC14
microsteps:16
rotation_distance: 39.94
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: -33
position_endstop:265
position_max:265
homing_speed:40
homing_retract_dist:0
homing_positive_dir:true
step_pulse_duration:0.000002

[stepper_y]
step_pin: M8P:PE2
dir_pin: M8P:PE1
enable_pin: !M8P:PE4
microsteps: 16
rotation_distance: 39.94
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: 0
position_endstop: 265
position_max: 265
homing_speed:40
homing_retract_dist:0
homing_positive_dir:True
step_pulse_duration:0.000002

[stepper_z]
step_pin: M8P:PB8
dir_pin: M8P:PB7
enable_pin: !M8P:PE0
microsteps: 16
rotation_distance: 8
full_steps_per_rotation: 200
endstop_pin: probe:z_virtual_endstop #!PC3 #for Z-max; endstop have'!' is NO
position_max:325
position_min: -6
homing_speed: 8
homing_retract_dist: 8.0
second_homing_speed: 8
homing_positive_dir:false
step_pulse_duration:0.000002

[tmc2209 stepper_x]
uart_pin: M8P:PC13
run_current:1.07
#hold_current: 0.5
interpolate: True
stealthchop_threshold: 0
diag_pin: ^M8P:PF4
driver_SGTHRS: 85
#driver_SGTHRS: 130

[tmc2209 stepper_y]
uart_pin: M8P:PE3
run_current: 1.07
#hold_current: 0.5
interpolate: True
stealthchop_threshold: 0
diag_pin: M8P:PF3
driver_SGTHRS: 85
#driver_SGTHRS: 145

[tmc2209 stepper_z]
uart_pin: M8P:PB9
run_current: 0.95
hold_current: 0.6
interpolate: True
stealthchop_threshold: 1200
#####################################################################################  Stepper X Y Z END

#####################################################################################  Heater Bed & Chanber START
[heater_bed]
heater_pin: M8P:PF5
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: M8P:PB1
max_power: 1.0
#control = pid
#pid_kp = 71.039
#pid_ki = 2.223
#pid_kd = 567.421
min_temp: -100
max_temp: 125


[verify_heater heater_bed]
max_error: 200
check_gain_time:60
hysteresis: 5
heating_gain: 1


[heater_generic Chamber_Heater]
heater_pin: M8P:PA0 
max_power: 0.7 
min_temp: 0
max_temp: 65 # Maximale sichere Temperatur für Ihren Bauraum
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: M8P:PB0
control: pid # PID-Regelung für präzisere Steuerung (empfohlen)
pid_Kp=63.418 
pid_Ki=1.342 
pid_Kd=749.125


[verify_heater Chamber_Heater]
max_error: 200
check_gain_time:120
hysteresis: 5
heating_gain: 1
#####################################################################################  Heater Bed & Chanber START



#####################################################################################  Start kcm.cfg Include-Datei
